AWSTemplateFormatVersion: "2010-09-09"
Description: >
  dayswithoutclaudeincident: scheduled Lambda that scrapes the Claude status RSS
  feed and republishes a static index.html to S3 showing days since the last
  recorded incident.

Parameters:
  CodeS3Bucket:
    Type: String
    Description: S3 bucket holding the packaged Lambda zip.
  CodeS3Key:
    Type: String
    Default: lambda.zip
    Description: Object key of the packaged Lambda zip in CodeS3Bucket.
  RssUrl:
    Type: String
    Default: https://status.claude.com/history.rss
  ScheduleExpression:
    Type: String
    Default: rate(1 hour)
  LambdaRuntime:
    Type: String
    Default: nodejs24.x
    Description: Lambda Node.js runtime
    AllowedValues:
      - nodejs24.x
  StateKey:
    Type: String
    Default: state/state.json
  IndexKey:
    Type: String
    Default: index.html

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadIndex
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/${IndexKey}"

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: site-and-state-rw
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "${SiteBucket.Arn}/${StateKey}"
                  - !Sub "${SiteBucket.Arn}/${IndexKey}"

  Function:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: !Ref LambdaRuntime
      Handler: handler.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref CodeS3Bucket
        S3Key: !Ref CodeS3Key
      Environment:
        Variables:
          BUCKET_NAME: !Ref SiteBucket
          STATE_KEY: !Ref StateKey
          INDEX_KEY: !Ref IndexKey
          RSS_URL: !Ref RssUrl

  Schedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: dwci-lambda
          Arn: !GetAtt Function.Arn

  SchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Function
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt Schedule.Arn

Outputs:
  WebsiteURL:
    Description: S3 website endpoint serving index.html.
    Value: !GetAtt SiteBucket.WebsiteURL
  BucketName:
    Description: Name of the site/state bucket.
    Value: !Ref SiteBucket
  FunctionName:
    Description: Lambda function name (use with `aws lambda invoke`).
    Value: !Ref Function
