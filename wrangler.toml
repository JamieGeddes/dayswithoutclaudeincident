name = "dwci-generator"
main = "src/worker.ts"
compatibility_date = "2026-05-08"

[triggers]
crons = ["0 * * * *"]

[assets]
directory = "./public/"
binding = "ASSETS"
run_worker_first = ["/", "/index.html"]
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

[[kv_namespaces]]
binding = "SITE_KV"
id = "319a6870ac36463dbdc0192780d1a389"

[vars]
RSS_URL = "https://status.claude.com/history.rss"
SITE_STATE_KEY = "site-state"

# Custom domain — uncomment once the apex is on Cloudflare DNS:
[[routes]]
pattern = "dayswithoutclaudeincident.com"
custom_domain = true
