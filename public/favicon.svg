<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Days without Claude incident">
  <defs>
    <pattern id="hazard" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="3" height="6" fill="#FFD100"/>
      <rect x="3" width="3" height="6" fill="#111111"/>
    </pattern>
    <clipPath id="card">
      <rect x="1" y="1" width="30" height="30" rx="3"/>
    </clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect x="1" y="1" width="30" height="30" fill="#fafaf6"/>
    <rect x="1" y="1" width="30" height="7" fill="url(#hazard)"/>
    <rect x="1" y="24" width="30" height="7" fill="url(#hazard)"/>
  </g>
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#111111" stroke-width="1.2"/>
  <text x="16" y="22" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="900" font-size="14" fill="#111111" letter-spacing="-0.5">0</text>
</svg>
