services:
  localstack:
    image: localstack/localstack:4.14.0   # pinned: 4.15+ moves Lambda to Pro
    container_name: dwci-localstack
    networks: [dwci-localstack-net]
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: s3,lambda,iam,events,logs
      DEBUG: "1"
      LAMBDA_RUNTIME_ENVIRONMENT_TIMEOUT: "60"
      LAMBDA_DOCKER_NETWORK: dwci-localstack-net
      AWS_DEFAULT_REGION: us-east-1
      BUCKET_NAME: dwci-local
      FUNCTION_NAME: dwci-fn
      STATE_KEY: state/state.json
      INDEX_KEY: index.html
      RSS_URL: https://status.claude.com/history.rss
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./infra/localstack/init:/etc/localstack/init/ready.d:ro"
      - "./lambda.zip:/var/lib/localstack/lambda.zip:ro"

networks:
  dwci-localstack-net:
    name: dwci-localstack-net
